<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawescape V10｜Navigation Quest Edition</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="brand" data-route="hub" aria-label="回到首页">
        <span class="brand-mark">✦</span>
        <span><b>Drawescape</b><small>世界折叠导航台</small></span>
      </button>
      <nav class="topnav" aria-label="主导航">
        <button data-route="hub">Hub</button>
        <button data-route="pipeline">世界管线</button>
        <button data-route="islands">知识岛屿</button>
        <button data-route="quests">跨岛任务</button>
        <button data-route="labs">实验室</button>
        <button data-route="glossary">术语星典</button>
        <button data-route="studio">绘画台</button>
        <button data-route="memory">压缩数据库</button>
      </nav>
      <div class="top-actions">
        <button id="openMapBtn" class="primary">🗺️ 快速地图</button>
        <button id="focusBtn" title="低负荷显示">◐</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="left-panel" aria-label="当前位置导航">
        <section class="panel-card compact">
          <div class="panel-title">当前位置</div>
          <div id="breadcrumb" class="breadcrumb">Drawescape / Hub</div>
          <button id="openLocalMapBtn" class="wide ghost">打开本区总平面</button>
        </section>
        <section class="panel-card grow">
          <div class="panel-title">本区导航</div>
          <div id="localNav" class="local-nav"></div>
        </section>
        <section class="panel-card compact">
          <div class="panel-title">快捷动作</div>
          <div class="quick-grid">
            <button data-route="quest-room">继续：盒子房间</button>
            <button data-route="lab-camera">FOV 实验</button>
            <button data-route="studio">打开绘画台</button>
            <button data-route="memory">保存库</button>
          </div>
        </section>
      </aside>

      <section class="main-stage" aria-label="主要内容">
        <div id="routeView"></div>
      </section>

      <aside class="right-panel" aria-label="知识检查器">
        <section class="panel-card inspector-card">
          <div class="panel-title">知识检查器</div>
          <div id="inspector" class="inspector"></div>
        </section>
        <section class="panel-card compact">
          <div class="panel-title">即时反馈</div>
          <div id="feedback" class="feedback-box">选择一个位置或完成一个小任务后，这里会显示反馈。</div>
        </section>
        <section class="panel-card compact">
          <div class="panel-title">输出卡片</div>
          <button id="saveCardBtn" class="wide primary">保存当前位置理解</button>
          <small class="hint">每一关都应产生一张可回看的知识卡。</small>
        </section>
      </aside>
    </main>

    <footer class="bottombar">
      <div id="questStatus">目标：打开地图，选择一个岛屿或任务。</div>
      <div class="bottombar-actions">
        <button id="prevBtn">← 上一步</button>
        <button id="nextBtn">下一步 →</button>
      </div>
    </footer>
  </div>

  <div id="mapOverlay" class="overlay" hidden>
    <div class="overlay-card worldmap-card">
      <div class="overlay-head">
        <div>
          <h2>🗺️ Drawescape 总平面图</h2>
          <p>像游戏地图一样快速切换位置。每个节点都对应一个可深化区域。</p>
        </div>
        <button id="closeMapBtn" class="close">×</button>
      </div>
      <div class="map-tabs">
        <button class="map-tab active" data-map="world">世界</button>
        <button class="map-tab" data-map="pipeline">管线</button>
        <button class="map-tab" data-map="islands">岛屿</button>
        <button class="map-tab" data-map="quests">任务</button>
      </div>
      <div id="worldMap" class="world-map"></div>
      <div class="map-note">快捷键：按 <b>M</b> 打开/关闭地图。按 <b>Esc</b> 关闭。</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
